services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel/config.yaml
    ports:
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus scrape
    networks:
      - otel

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus-docker.yml:/etc/prometheus/prometheus.yml
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector
    networks:
      - otel

  # Trace backend: view traces and span attributes (prompts, messages) at http://localhost:16686
  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      # Listen on 0.0.0.0 so the collector (other container) can reach 4317
      COLLECTOR_OTLP_GRPC_HOST_PORT: "0.0.0.0:4317"
    ports:
      - "16686:16686"   # UI
      - "4317:4317"     # OTLP gRPC (collector sends traces here)
    networks:
      - otel

  app:
    build: .
    env_file: .env
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318/
    depends_on:
      - otel-collector
    stdin_open: true
    tty: true
    networks:
      - otel

networks:
  otel:
    driver: bridge
