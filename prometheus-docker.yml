# Prometheus config for docker-compose: scrape the collector by service name.
# GenAI metrics appear only after the app has made at least one LLM call (then wait ~15s).
scrape_configs:
  - job_name: "otel-collector"
    scrape_interval: 15s
    static_configs:
      - targets: ["otel-collector:8889"]
  # Self-metrics so Prometheus always has some data (confirms Prometheus is working)
  - job_name: "prometheus"
    scrape_interval: 15s
    static_configs:
      - targets: ["localhost:9090"]
