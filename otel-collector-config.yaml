# OTLP Collector: receives traces + metrics from the app; exports metrics to Prometheus.
# Traces (including contents/messages) are NOT sent to Prometheus (Prometheus is metrics-only).
# Run: otelcol-contrib --config=otel-collector-config.yaml
# Docker (expose 4318 OTLP, 8889 Prometheus scrape):
#   docker run -v $(pwd)/otel-collector-config.yaml:/etc/otel/config.yaml -p 4318:4318 -p 8889:8889 otel/opentelemetry-collector-contrib:latest --config=/etc/otel/config.yaml
receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  debug:
    verbosity: detailed
  # Metrics in Prometheus format; Prometheus scrapes http://<collector>:8889/metrics
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: "genai"
  # Traces (with prompts/messages in span attributes) → Jaeger UI at http://localhost:16686
  otlp_grpc/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, otlp_grpc/jaeger]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, prometheus]
